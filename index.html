<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채이즈 · chaeijeu</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee;
    --blush: #f7c5c5;
    --lilac: #d9c5f0;
    --mint:  #bde8dc;
    --butter:#f9e8a0;
    --peach: #fad5b0;
    --dark:  #3a2f3b;
    --mid:   #7a6880;
    --light: #c4b8cc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--cream);
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--dark);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, #f7c5c540 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, #d9c5f040 0%, transparent 40%),
      radial-gradient(circle at 50% 90%, #bde8dc30 0%, transparent 35%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 56px 24px 32px;
  }
  .brand-badge {
    display: inline-block;
    background: var(--dark);
    color: var(--cream);
    font-family: 'Gaegu', cursive;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 6px 16px;
    border-radius: 100px;
    margin-bottom: 18px;
    animation: fadeDown 0.6s ease both;
  }
  .brand-title {
    font-family: 'Gaegu', cursive;
    font-size: clamp(48px, 10vw, 80px);
    font-weight: 700;
    line-height: 1;
    color: var(--dark);
    animation: fadeDown 0.7s 0.1s ease both;
    display: inline-block;
  }
  .brand-title .ko {
    display: block;
    font-family: 'Nanum Pen Script', cursive;
    font-size: clamp(22px, 4vw, 34px);
    color: var(--mid);
    margin-top: 4px;
    letter-spacing: 6px;
  }
  .tagline {
    margin-top: 14px;
    font-size: 14px;
    color: var(--mid);
    letter-spacing: 1px;
    animation: fadeDown 0.7s 0.2s ease both;
  }
  .deco-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
    animation: fadeDown 0.7s 0.3s ease both;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; }

  .divider {
    position: relative;
    z-index: 1;
    text-align: center;
    font-size: 22px;
    letter-spacing: 12px;
    color: var(--light);
    margin: 8px 0 40px;
    animation: fadeDown 0.7s 0.35s ease both;
  }

  /* ── GRID ── */
  .grid-container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 32px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 28px;
  }

  /* ── TOMBOL ADD PRODUCT ── */
  .btn-enter-product {
    position: absolute;
    top: 24px;
    right: 24px;
    background-color: var(--dark);
    color: var(--cream);
    font-family: 'Gaegu', cursive;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 20px;
    border-radius: 4px;
    text-decoration: none;
    font-weight: 700;
    transition: background 0.2s, transform 0.15s;
    z-index: 10;
  }
  .btn-enter-product:hover {
    background-color: var(--mid);
    transform: scale(1.03);
  }

  /* Responsif: Jika dibuka di HP, tombol otomatis pindah ke tengah bawah tagline */
  @media (max-width: 600px) {
    .btn-enter-product {
      position: relative;
      top: unset;
      right: unset;
      display: inline-block;
      margin-top: 16px;
    }
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 4px 20px #3a2f3b12;
    transition: transform 0.35s cubic-bezier(.22,1,.36,1), box-shadow 0.35s ease;
    animation: cardIn 0.6s ease both;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-8px) rotate(-0.5deg);
    box-shadow: 0 16px 40px #3a2f3b20;
  }
  .card:nth-child(1) { animation-delay: 0.10s; }
  .card:nth-child(2) { animation-delay: 0.17s; }
  .card:nth-child(3) { animation-delay: 0.24s; }
  .card:nth-child(4) { animation-delay: 0.31s; }
  .card:nth-child(5) { animation-delay: 0.38s; }
  .card:nth-child(6) { animation-delay: 0.45s; }
  .card:nth-child(7) { animation-delay: 0.52s; }
  .card:nth-child(8) { animation-delay: 0.59s; }

  /* ── PRODUCT IMAGE ── */
  .card-img-wrap {
    position: relative;
    aspect-ratio: 3 / 4;
    overflow: hidden;
    background: var(--cream);
  }
  /* ↓ The actual <img> tag — swap src to your own photo file */
  .card-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.45s cubic-bezier(.22,1,.36,1);
  }
  .card:hover .card-img-wrap img {
    transform: scale(1.05);
  }
  /* Fallback shown while / if image is missing */
  .card-img-wrap .img-fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    z-index: 0;
  }
  .card-img-wrap .img-fallback span {
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 11px;
    color: var(--light);
    letter-spacing: 1px;
  }
  /* Hide fallback once real image loads */
  .card-img-wrap img.loaded ~ .img-fallback { display: none; }
  .card-img-wrap img { position: relative; z-index: 1; }

  
  /* ── CARD BODY ── */
  .card-body { padding: 18px 20px 20px; }
  .card-tag {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 100px;
    margin-bottom: 10px;
  }
  .card-name {
    font-family: 'Gaegu', cursive;
    font-size: 20px;
    font-weight: 700;
    color: var(--dark);
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .card-name .ko-name {
    display: block;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 12px;
    color: var(--mid);
    font-weight: 400;
    letter-spacing: 1px;
    margin-top: 2px;
  }
  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
  }
  .card-price {
    font-family: 'Gaegu', cursive;
    font-size: 22px;
    font-weight: 700;
    color: var(--dark);
  }
  .card-price span { font-size: 13px; color: var(--mid); font-weight: 400; margin-left: 2px; }
  .btn-add {
    background: var(--dark);
    color: var(--cream);
    border: none;
    border-radius: 100px;
    padding: 8px 16px;
    font-family: 'Gaegu', cursive;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.5px;
  }
  .btn-add:hover { background: var(--mid); transform: scale(1.05); }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 32px 24px 48px;
    border-top: 1px dashed var(--light);
    color: var(--light);
    font-size: 12px;
    letter-spacing: 2px;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
</style>
</head>
<body>

<header>
  <a href="add-product-3.html" class="btn-enter-product">+ Enter Product</a>
  <div class="brand-badge">✦ life is better in pyjamas ✦</div>
  <h1 class="brand-title">
    chaeijeu
    <span class="ko">채이즈</span>
  </h1>
  <p class="tagline">soft pyjamas for soft days 🌙</p>
  <div class="deco-row">
    <div class="dot" style="background:var(--blush)"></div>
    <div class="dot" style="background:var(--lilac)"></div>
    <div class="dot" style="background:var(--mint)"></div>
    <div class="dot" style="background:var(--butter)"></div>
    <div class="dot" style="background:var(--peach)"></div>
  </div>
</header>

<div class="divider">· · · ♡ · · ·</div>

<div class="grid-container" id="product-grid"></div>

<footer>© 2026 채이즈 chaeijeu &nbsp;·&nbsp; 잠옷은 사랑이에요 🌸</footer>

<script>
// ┌─────────────────────────────────────────────────────────────┐
// │  Products load automatically from Google Sheets (CSV).      │
// │  Sheet columns (row 1 = headers):                           │
// │    name | koName | tag | price | image                      │
// └─────────────────────────────────────────────────────────────┘
const SHEET_CSV_URL =
  'https://docs.google.com/spreadsheets/d/e/2PACX-1vRYeTcG-rEV8buv8AS3YsnjWQ26vf6b85gqnOVJ11vmEF_vd5kLJbkJNFM3sEUgFifAjcJewHS-8RPg/pub?output=csv';

// ── CSV parser (handles quoted fields with commas / newlines) ──
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuote = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i + 1];
    if (inQuote) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuote = false; }
      else { field += ch; }
    } else {
      if (ch === '"') { inQuote = true; }
      else if (ch === ',') { row.push(field.trim()); field = ''; }
      else if (ch === '\n' || (ch === '\r' && next === '\n')) {
        row.push(field.trim()); field = '';
        if (row.some(Boolean)) rows.push(row);
        row = [];
        if (ch === '\r') i++;
      } else { field += ch; }
    }
  }
  if (field || row.length) { row.push(field.trim()); if (row.some(Boolean)) rows.push(row); }
  return rows;
}

function csvToObjects(rows) {
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(row => {
    const obj = {};
    headers.forEach((h, i) => obj[h] = (row[i] || '').trim());
    return obj;
  });
}

// ── Card template (unchanged from original design) ──
function makeCard(p, index) {
  return `
  <div class="card" style="animation-delay:${0.10 + index * 0.07}s">
    <div class="card-img-wrap">
      <img
        src="${p.image || ''}"
        alt="${p.name}"
        loading="lazy"
        onload="this.classList.add('loaded')"
        onerror="this.style.display='none'"
      />
      <div class="img-fallback">
        <span>add your photo →</span>
      </div>
    </div>
    <div class="card-body">
      <div class="card-tag">${p.tag || ''}</div>
      <div class="card-name">
        ${p.name || ''}
        <span class="ko-name">${p.koName || ''}</span>
      </div>
      <div class="card-footer">
        <div class="card-price">${p.price || ''}<span>KRW</span></div>
        <button class="btn-add">담기 ♡</button>
      </div>
    </div>
  </div>`;
}

function attachButtonListeners() {
  document.querySelectorAll('.btn-add').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      btn.textContent = '✓ 담았어요!';
      btn.style.background = '#bde8dc';
      btn.style.color = '#3a2f3b';
      setTimeout(() => {
        btn.textContent = '담기 ♡';
        btn.style.background = '';
        btn.style.color = '';
      }, 1500);
    });
  });
}

// ── Fetch & render ──
const grid = document.getElementById('product-grid');

grid.innerHTML = '<p style="text-align:center;color:var(--light);letter-spacing:2px;padding:48px;font-size:13px;">불러오는 중… 🌙</p>';

fetch(SHEET_CSV_URL)
  .then(res => {
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.text();
  })
  .then(text => {
    const rows = parseCSV(text);
    const products = csvToObjects(rows).filter(p => p.name);
    if (!products.length) throw new Error('No products found — check your sheet has a header row and at least one data row.');
    grid.innerHTML = products.map((p, i) => makeCard(p, i)).join('');
    attachButtonListeners();
  })
  .catch(err => {
    console.error('chaeijeu: failed to load products', err);
    grid.innerHTML = `<p style="text-align:center;color:var(--mid);letter-spacing:1px;padding:48px;font-size:13px;">
      상품을 불러오지 못했어요 😔<br><small style="color:var(--light)">${err.message}</small></p>`;
  });
</script>
</body>
</html>
